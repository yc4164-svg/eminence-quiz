<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Eminence Quiz</title>
<style>
  /* ============ tokens ============ */
  :root{
    --bg:#faf6ef; --card:#fffdf9; --ink:#2b2519; --ink2:#655c4d; --muted:#9a9080;
    --line:#e9e2d5; --accent:#c4552a; --accent-soft:#f7e3d8; --accent-ink:#ffffff;
    --bar:#2a78d6; --bar-track:#efe9dd; --skip:#d8d0c1;
    --chip:#f2ecdf; --chip-ink:#4d4536;
    --radius:14px;
    --shadow:0 1px 3px rgba(43,37,25,.08), 0 10px 28px rgba(43,37,25,.07);
    --font:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{background:var(--bg); color:var(--ink); font-family:var(--font);
    -webkit-font-smoothing:antialiased; line-height:1.5}
  .wrap{max-width:680px; margin:0 auto; padding:20px 16px 60px}
  a{color:var(--accent)}
  h1,h2,h3{line-height:1.2}

  /* ============ progress ============ */
  #progressWrap{display:none; margin:6px 0 18px}
  #progressWrap.on{display:block}
  .ptrack{height:8px; background:var(--bar-track); border-radius:99px; overflow:hidden}
  .pfill{height:100%; width:0%; background:var(--accent); border-radius:99px;
    transition:width .3s ease}
  .plabel{font-size:12px; color:var(--muted); margin-top:6px; text-align:right}

  /* ============ stage & transitions ============ */
  #stage{transition:opacity .22s ease, transform .22s ease}
  #stage.out{opacity:0; transform:translateY(10px)}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:26px 24px}
  @media (max-width:480px){ .card{padding:20px 16px} }

  /* ============ landing ============ */
  .hero-badge{display:inline-block; font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent); background:var(--accent-soft); padding:4px 12px; border-radius:99px;
    font-weight:600; margin-bottom:14px}
  .landing h1{font-size:clamp(30px,6vw,42px); margin-bottom:10px; letter-spacing:-.01em}
  .landing .sub{font-size:17px; color:var(--ink2); margin-bottom:22px}
  .statline{display:flex; gap:18px; flex-wrap:wrap; margin-bottom:24px}
  .statline div{font-size:13px; color:var(--ink2)}
  .statline b{display:block; font-size:22px; color:var(--ink)}

  .btn{appearance:none; border:none; cursor:pointer; font-family:inherit; font-size:16px;
    font-weight:600; border-radius:12px; padding:13px 24px; transition:transform .08s ease, box-shadow .15s ease, background .15s ease}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--accent); color:var(--accent-ink); box-shadow:0 3px 10px rgba(196,85,42,.3)}
  .btn.primary:hover{background:#b04a23}
  .btn.ghost{background:transparent; color:var(--ink2); border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--chip)}
  .btn.small{font-size:14px; padding:9px 16px}
  .btn:disabled{opacity:.4; cursor:not-allowed}

  .disclaimer{margin-top:26px; background:#fbf3e2; border:1px solid #eddfbe; border-radius:12px;
    padding:16px 18px; font-size:13.5px; color:#5b5136}
  .disclaimer b{color:#463d24}

  /* ============ question ============ */
  .qpre{font-size:13px; color:var(--muted); background:var(--chip); border-radius:10px;
    padding:10px 14px; margin-bottom:18px}
  .qnum{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent);
    font-weight:700; margin-bottom:8px}
  .qtext{font-size:20px; font-weight:650; margin-bottom:20px}
  @media (max-width:480px){ .qtext{font-size:18px} }

  .opt{display:block; width:100%; text-align:left; background:var(--card); border:1.5px solid var(--line);
    border-radius:12px; padding:13px 16px; margin-bottom:10px; font-size:15.5px; color:var(--ink);
    cursor:pointer; font-family:inherit; transition:border-color .12s, background .12s}
  .opt:hover{border-color:#cbbfa8; background:#fdf9f0}
  .opt.sel{border-color:var(--accent); background:var(--accent-soft)}
  .opt .letter{display:inline-block; min-width:22px; font-weight:700; color:var(--accent)}

  .check{display:flex; align-items:flex-start; gap:12px}
  .check .box{flex:0 0 auto; width:22px; height:22px; border:2px solid #cbbfa8; border-radius:6px;
    margin-top:2px; position:relative; transition:background .12s, border-color .12s}
  .check.sel .box{background:var(--accent); border-color:var(--accent)}
  .check.sel .box::after{content:""; position:absolute; left:6px; top:2px; width:5px; height:10px;
    border:solid #fff; border-width:0 2.5px 2.5px 0; transform:rotate(45deg)}

  .likertRow{display:flex; flex-direction:column; gap:10px}

  .sliderBox{padding:8px 4px 2px}
  input[type=range]{width:100%; accent-color:var(--accent); height:34px; cursor:pointer}
  .anchors{display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-top:2px}
  .sliderVal{text-align:center; font-size:30px; font-weight:700; color:var(--accent); margin:6px 0}
  .sliderVal.untouched{color:var(--skip)}

  .navRow{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:22px}
  .navRow .right{display:flex; gap:10px}

  /* ============ results ============ */
  .heroCard{background:linear-gradient(135deg,#2b2519,#4a3a26); color:#f8f2e6; border:none;
    text-align:center; padding:38px 24px}
  .heroCard .eyebrow{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:#d8b98f; font-weight:600}
  .heroCard h2{font-size:clamp(28px,6vw,40px); margin:10px 0 12px; letter-spacing:-.01em}
  .heroCard p{color:#e5dcc9; font-size:16px; max-width:44ch; margin:0 auto}

  .section{margin-top:26px}
  .section h3{font-size:19px; margin-bottom:4px}
  .section .shint{font-size:13px; color:var(--muted); margin-bottom:14px}

  .evrow{display:flex;align-items:baseline;gap:8px;margin-top:7px}
  .evrow .chip{flex:0 0 auto}
  .evtext{font-size:12.5px;color:var(--muted);line-height:1.5}
  .sectorSel{width:100%;max-width:420px;display:block;margin-top:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:15px;font-family:var(--font)}
  .banner{background:#fdefe7; border:1px solid #f3d3c2; color:#8a4728; border-radius:12px;
    padding:12px 16px; font-size:14px; margin-top:16px}

  .domain{margin-bottom:16px}
  .domain .dname{font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
    color:var(--ink2); margin-bottom:6px}
  .trow{display:grid; grid-template-columns:minmax(120px,190px) 1fr 44px; gap:10px; align-items:center;
    margin-bottom:6px}
  .trow .tname{font-size:13.5px; color:var(--ink)}
  .trow .track{height:12px; background:var(--bar-track); border-radius:99px; overflow:hidden}
  .trow .fill{height:100%; background:var(--bar); border-radius:99px 4px 4px 99px; min-width:2px;
    transition:width .6s ease}
  .trow .tval{font-size:12.5px; color:var(--ink2); text-align:right; font-variant-numeric:tabular-nums}
  .trow.skipped .tname{color:var(--muted)}
  .trow.skipped .tval{color:var(--skip); font-style:italic}
  @media (max-width:480px){ .trow{grid-template-columns:105px 1fr 40px} .trow .tname{font-size:12px} }

  .cards{display:grid; gap:12px}
  .fieldCard,.figCard{border:1px solid var(--line); border-radius:12px; padding:16px 18px; background:var(--card)}
  .fieldCard .frank{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:700}
  .fieldCard .fname{font-size:19px; font-weight:700; margin:2px 0}
  .fieldCard .ffit{font-size:14px; color:var(--accent); font-weight:700}
  .fieldCard .ffitlabel{font-size:12px; color:var(--muted); font-weight:400}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
  .chip{background:var(--chip); color:var(--chip-ink); border-radius:99px; padding:4px 11px; font-size:12.5px}
  .figCard .fgname{font-size:18px; font-weight:700}
  .figCard .fgsector{font-size:13px; color:var(--ink2)}
  .figCard .fgoverlap{float:right; font-size:15px; font-weight:700; color:var(--accent)}
  .figCard .caveat{font-size:11.5px; color:var(--muted); margin-top:10px; font-style:italic}
  .shareLead{font-size:13px; color:var(--ink2); margin-top:10px}

  .btnRow{display:flex; flex-wrap:wrap; gap:10px; margin-top:24px}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--ink);
    color:#fdf8ee; font-size:14px; padding:10px 18px; border-radius:99px; opacity:0;
    transition:opacity .25s; pointer-events:none; z-index:50; max-width:90vw; text-align:center}
  .toast.on{opacity:1}
  .savenote{font-size:12.5px; color:var(--muted); margin-top:10px}
  .savenote.err{color:#a33}
  .fghead{display:flex; gap:14px; align-items:center; margin-top:2px}
  .fgava{width:56px; height:56px; border-radius:50%; object-fit:cover; flex:0 0 auto;
    border:1px solid var(--line); background:var(--chip)}
  span.fgava{display:flex; align-items:center; justify-content:center; font-weight:700;
    color:#fff; font-size:19px; letter-spacing:.02em; user-select:none}
  .figCard .fgname a{color:inherit; text-decoration:none; border-bottom:1px dotted var(--muted)}
  .figCard .fgname a:hover{color:var(--accent); border-bottom-color:var(--accent)}

  .langBtn{position:fixed; top:12px; right:12px; z-index:60; appearance:none; cursor:pointer;
    font-family:inherit; font-size:13px; font-weight:600; color:var(--ink2);
    background:var(--card); border:1px solid var(--line); border-radius:99px; padding:6px 14px;
    box-shadow:var(--shadow)}
  .langBtn:hover{background:var(--chip)}

  footer{margin-top:34px; text-align:center; font-size:12px; color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

    <div class="ptrack"><div class="pfill" id="pfill"></div></div>

  <footer id="foot">The Eminence Project · all data stays in your browser</footer>
</div>
<div class="toast" id="toast"></div>
<button class="langBtn" id="langBtn" type="button">中文</button>

/* ================= scoring (spec §2) ================= */
function computeR(answers){
  const contrib = {};
  const add = (c,v)=>{ (contrib[c] = contrib[c] || []).push(v); };
  for (const q of QUESTIONS){
    const a = answers[q.id];
    if (a === undefined) continue;               // skipped → contributes nothing
    if (q.type === "check"){
      // answered (>=1 item or "none"): every item's codes scored; unchecked = 0
      for (const it of q.items){
        const checked = a.includes(it.k);
        for (const c in it.m) add(c, checked ? it.m[c] : 0);
      }
    } else if (q.type === "likert"){
      const v = a / 4;                            // 0,.25,.5,.75,1
      for (const c in q.m) add(c, q.m[c] * v);
    } else if (q.type === "forced"){
      const opt = q.opts.find(o => o.k === a);
      if (opt) for (const c in opt.m) add(c, opt.m[c]);   // "–" codes simply absent
    } else if (q.type === "slider"){
      for (const [c,v] of q.fn(a)) add(c, v);
    }
  }
  const r = {};
  for (const c of CODES){
    r[c] = contrib[c] ? contrib[c].reduce((s,x)=>s+x,0) / contrib[c].length : null;
  }
  return r;
}

/* ================= field match (spec §3) ================= */
function fieldMatch(r){
  const A = CODES.filter(c => r[c] !== null);
  const mu = A.reduce((s,c)=>s+r[c],0) / A.length;
  const x = {}; A.forEach(c => x[c] = r[c] - mu);
  const sx2 = A.reduce((s,c)=>s+x[c]*x[c],0);
  if (sx2 <= 1e-12) return { flat:true, fields:[] };
  const scores = {};
  for (const s of SECTORS){
    let dot = 0, sz2 = 0;
    for (const c of A){ const z = FP[s][c]; dot += x[c]*z; sz2 += z*z; }
    scores[s] = sz2 > 0 ? dot / (Math.sqrt(sx2)*Math.sqrt(sz2)) : 0;
  }
  // softmax T=0.35 over all 13
  const mx = Math.max(...SECTORS.map(s=>scores[s]));
  let Z = 0; const e = {};
  for (const s of SECTORS){ e[s] = Math.exp((scores[s]-mx)/SOFTMAX_T); Z += e[s]; }
  const ranked = SECTORS.map(s => ({sector:s, score:scores[s], fit:100*e[s]/Z}))
                        .sort((a,b)=>b.fit-a.fit).slice(0,3);
  // drivers: top-3 positive contributions k_c = x_c * z(c,s)
  for (const f of ranked){
    f.drivers = A.map(c => ({c, k: x[c]*FP[f.sector][c], x: x[c]}))
                 .filter(d => d.k > 0)
                 .sort((a,b)=>b.k-a.k).slice(0,3);   // objects {c,k,x} — rendered via driverLabel() per language
  }
  return { flat:false, fields:ranked };
}

/* ================= celebrity match (spec §4) ================= */
function figureMatch(r, sectorFilter, minShared){
  const gate = (minShared === undefined) ? 3 : minShared;
  const A = CODES.filter(c => r[c] !== null);
  const b = {}; A.forEach(c => b[c] = r[c] >= BIN_CUT ? 1 : 0);
  const scored = [];
  for (const subj of SUBJECTS){
    if (subj.n < MIN_N) continue;
    if (sectorFilter && subj.sector !== sectorFilter) continue;
    let inter = 0, ru = 0, vu = 0;
    for (const c of A){
      const rc = r[c], vc = subj.v[c], w = W1[c];
      inter += Math.min(rc, vc) * w;   // rarity-weighted Dice over present traits
      ru += rc * w; vu += vc * w;
    }
    scored.push({ subj, sim: (ru + vu) > 0 ? 2*inter/(ru + vu) : 0 });
  }
  scored.sort((p,q) => q.sim - p.sim || q.subj.n - p.subj.n ||
                       (p.subj.id < q.subj.id ? -1 : p.subj.id > q.subj.id ? 1 : 0));
  const out = [];
  for (const {subj, sim} of scored){
    if (subj.name === subj.id) continue;         // defensive only — all subjects now carry real names
    const shared = A.filter(c => b[c] === 1 && subj.v[c] === 1);
    if (shared.length < gate) continue;          // displayable gate
    shared.sort((c1,c2) => W1[c2]-W1[c1]);
    out.push({ id:subj.id, name:subj.name, zh:subj.zh||"", cn:subj.cn||0, sector:subj.sector, sim,
               p:subj.p, w:subj.w, shared: shared.slice(0,5) });
    if (out.length === 3) break;
  }
  // guarantee: at least one Greater-China figure among the displayed matches
  if (out.length && !out.some(m => m.cn)){
    let repl = null;
    for (const relax of [gate, gate-1]){
      if (relax < 1) break;
      for (const {subj, sim} of scored){
        if (!subj.cn || subj.name === subj.id) continue;
        if (out.some(m => m.id === subj.id)) continue;
        const shared = A.filter(c => b[c] === 1 && subj.v[c] === 1);
        if (shared.length < relax) continue;
        shared.sort((c1,c2) => W1[c2]-W1[c1]);
        repl = { id:subj.id, name:subj.name, zh:subj.zh||"", cn:1, sector:subj.sector, sim,
                 p:subj.p, w:subj.w, shared: shared.slice(0,5) };
        break;
      }
      if (repl) break;
    }
    if (repl){
      if (out.length === 3) out[2] = repl; else out.push(repl);
    }
  }
  return out;
}

/* ================= archetype (spec §5) ================= */
function archetype(r){
  const measured = [];
  DOMAINS.forEach((d,i) => {
    const vals = d.codes.filter(c => r[c] !== null).map(c => r[c]);
    if (vals.length) measured.push({ i, d, score: vals.reduce((s,x)=>s+x,0)/vals.length });
  });
  if (measured.length < 2) return { label:"The Enigma", noun:"enigma", adj:"unreadable", enigma:true };
  measured.sort((a,b) => b.score - a.score || a.i - b.i);   // tie-break: table order
  const noun = measured[0].d.noun, adj = measured[1].d.adj;
  return { label: "The " + adj + " " + noun, noun, adj, i0: measured[0].i, i1: measured[1].i };
}

function uuid4(){
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, ch => {
    const r = Math.random()*16|0, v = ch === "x" ? r : (r&0x3|0x8);
    return v.toString(16);
  });
}
function saveRecord(rec){
  try{
    const arr = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
    arr.push(rec);
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
    return true;
  }catch(e){ console.warn("localStorage save failed", e); return false; }
}
function updateSavedRecord(rec){
  try{
    const arr = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
    const i = arr.findIndex(x => x && x.session_id === rec.session_id);
    if (i >= 0){ arr[i] = rec; localStorage.setItem(LS_KEY, JSON.stringify(arr)); }
  }catch(e){ console.warn("localStorage update failed", e); }
}
function loadRecords(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); }
  catch(e){ return []; }
}
function csvEscape(s){
  s = String(s == null ? "" : s);
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function csvHeader(){
  return ["session_id","ts","quiz_version","archetype"]
    .concat(CODES.map(c => "r_"+c))
    .concat(["field1","fit1","field2","fit2","field3","fit3",
             "match1_id","match1_sim","match2_id","match2_sim","match3_id","match3_sim","user_sector","lang"]);
}
function recordToRow(rec){
  const row = [rec.session_id, rec.ts, rec.quiz_version, rec.archetype];
  for (const c of CODES){
    const v = rec.r ? rec.r[c] : null;
    row.push(v === null || v === undefined ? "" : +v.toFixed(4));
  }
  for (let i = 0; i < 3; i++){
    const f = (rec.fields||[])[i];
    row.push(f ? f.sector : "", f ? f.fit : "");
  }
  for (let i = 0; i < 3; i++){
    const m = (rec.matches||[])[i];
    row.push(m ? m.id : "", m ? m.sim : "");
  }
  row.push(rec.user_sector || "", rec.lang || "");
  return row;
}
function downloadCSV(rows, filename){
  const text = rows.map(row => row.map(csvEscape).join(",")).join("\r\n") + "\r\n";
  const blob = new Blob([text], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 400);
}

function navRowHTML(showNext){
  return '<div class="navRow">' +
    '<button class="btn ghost small" id="backBtn"' + (qIdx===0?' style="visibility:hidden"':'') + '>&larr; ' + t("Back") + '</button>' +
    '<div class="right">' +
      '<button class="btn ghost small" id="skipBtn">' + t("Skip") + '</button>' +
      (showNext ? '<button class="btn primary small" id="nextBtn">' + t("Next") + ' &rarr;</button>' : '') +
    '</div></div>';
}
function wireNav(onNext){
  document.getElementById("backBtn").onclick = goBack;
  document.getElementById("skipBtn").onclick = () => {
    if (advancing) return;
    advancing = true;
    if (advanceTimer){ clearTimeout(advanceTimer); advanceTimer = null; }
    delete answers[QUESTIONS[qIdx].id];
    goNext();
  };
  const nb = document.getElementById("nextBtn");
  if (nb && onNext) nb.onclick = () => {
    if (advancing) return;
    advancing = true;
    onNext();
  };
}

function renderQuestion(){
  screen = "question";
  advancing = false;
  if (advanceTimer){ clearTimeout(advanceTimer); advanceTimer = null; }
  setProgress();
  const q = QUESTIONS[qIdx];
  const pre = qIdx === 0 ? '<div class="qpre">' + prefaceHTML() + '</div>' : '';
  let body = "";

  if (q.type === "check"){
    const cur = answers[q.id] || [];
    body = q.items.map((it,i) =>
      '<button type="button" class="opt check' + (cur.includes(it.k)?' sel':'') + '" data-k="' + it.k + '">' +
      '<span class="box"></span><span>' + esc(qOpt(q, i, it.t)) + '</span></button>'
    ).join("") +
    '<button type="button" class="opt check' + (cur.includes("none")?' sel':'') + '" data-k="none">' +
    '<span class="box"></span><span><em>' + esc(t("None of these")) + '</em></span></button>';
  } else if (q.type === "likert"){
    const cur = answers[q.id];
    body = '<div class="likertRow">' + likertLabels().map((lab,i) =>
      '<button type="button" class="opt' + (cur===i?' sel':'') + '" data-v="' + i + '">' + esc(lab) + '</button>'
    ).join("") + '</div>';
  } else if (q.type === "forced"){
    const cur = answers[q.id];
    body = q.opts.map((o,i) =>
      '<button type="button" class="opt' + (cur===o.k?' sel':'') + '" data-k="' + o.k + '">' +
      '<span class="letter">' + o.k.toUpperCase() + '</span> ' + esc(qOpt(q, i, o.t)) + '</button>'
    ).join("");
  } else if (q.type === "slider"){
    const cur = answers[q.id];
    const touched = cur !== undefined;
    body = '<div class="sliderBox">' +
      '<div class="sliderVal' + (touched?'':' untouched') + '" id="sv">' + (touched?cur:'–') + '</div>' +
      '<input type="range" min="0" max="100" step="1" id="sl" value="' + (touched?cur:50) + '">' +
      '<div class="anchors"><span>' + esc(qAnchor(q, 0, q.lo)) + '</span><span>' + esc(qAnchor(q, 1, q.hi)) + '</span></div>' +
      '<div style="margin-top:12px"><button class="btn ghost small" id="zeroBtn">' + esc(t("Exactly 0 is my answer")) + '</button></div>' +
      '</div>';
  }

  const qnum = LANG === "zh" ? "第 " + (+q.id.slice(1)) + " 题" : q.id.replace("Q","Question ");
  stage.innerHTML = '<div class="card">' + pre +
    '<div class="qnum">' + qnum + '</div>' +
    '<div class="qtext">' + esc(qText(q)) + '</div>' + body +
    navRowHTML(q.type === "check" || q.type === "slider") + '</div>';

  if (q.type === "check"){
    const btns = [...stage.querySelectorAll(".opt.check")];
    const refresh = () => {
      const cur = answers[q.id] || [];
      btns.forEach(b => b.classList.toggle("sel", cur.includes(b.dataset.k)));
      document.getElementById("nextBtn").disabled = cur.length === 0;
    };
    btns.forEach(b => b.onclick = () => {
      let cur = answers[q.id] || [];
      const k = b.dataset.k;
      if (k === "none") cur = cur.includes("none") ? [] : ["none"];
      else {
        cur = cur.filter(x => x !== "none");
        cur = cur.includes(k) ? cur.filter(x => x !== k) : cur.concat([k]);
      }
      if (cur.length) answers[q.id] = cur; else delete answers[q.id];
      refresh();
    });
    refresh();
    wireNav(() => goNext());
  } else if (q.type === "likert"){
    stage.querySelectorAll(".likertRow .opt").forEach(b => b.onclick = () => {
      if (advancing) return;
      advancing = true;
      answers[q.id] = +b.dataset.v;
      stage.querySelectorAll(".likertRow .opt").forEach(x => x.classList.toggle("sel", x === b));
      advanceTimer = setTimeout(goNext, 260);
    });
    wireNav();
  } else if (q.type === "forced"){
    stage.querySelectorAll(".opt").forEach(b => b.onclick = () => {
      if (advancing) return;
      advancing = true;
      answers[q.id] = b.dataset.k;
      stage.querySelectorAll(".opt").forEach(x => x.classList.toggle("sel", x === b));
      advanceTimer = setTimeout(goNext, 260);
    });
    wireNav();
  } else if (q.type === "slider"){
    const sl = document.getElementById("sl"), sv = document.getElementById("sv");
    const nb = document.getElementById("nextBtn");
    nb.disabled = answers[q.id] === undefined;
    const commit = () => {
      answers[q.id] = +sl.value;
      sv.textContent = sl.value; sv.classList.remove("untouched");
      nb.disabled = false;
    };
    sl.oninput = commit;
    sl.onpointerup = commit;   // confirms the default 50 (or any value) on release
    sl.onclick = commit;       // keyboard / assistive click confirmation
    document.getElementById("zeroBtn").onclick = () => {
      sl.value = 0; commit();
    };
    wireNav(() => goNext());
  }
}

/* ---------- results ---------- */
function indefArticle(word){ return /^[aeiou]/i.test(word) ? "an" : "a"; }

function initialsAvatarHTML(m, show){
  const initials = esc(String(m.name).trim().split(/\s+/).map(w => w.charAt(0)).slice(0,2).join("").toUpperCase() || "?");
  let h = 0;
  for (let i = 0; i < m.id.length; i++) h = (h*31 + m.id.charCodeAt(i)) % 360;
  return '<span class="fgava fb" style="display:' + (show ? 'flex' : 'none') +
         ';background:hsl(' + h + ',42%,52%)">' + initials + '</span>';
}
function avatarHTML(m){
  if (!m.p) return initialsAvatarHTML(m, true);
  // lazy-loaded portrait; offline / broken image falls back to initials (no broken-image icon)
  return '<img class="fgava" src="' + escAttr(m.p) + '" alt="" loading="lazy" referrerpolicy="no-referrer" ' +
         'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
         initialsAvatarHTML(m, false);
}

function figName(m){ return (LANG === "zh" && m.zh) ? m.zh : m.name; }
function figCardHTML(m){
  const nameHTML = m.w
    ? '<a href="' + escAttr(m.w) + '" target="_blank" rel="noopener">' + esc(figName(m)) + '</a>'
    : esc(figName(m));
  return '<div class="figCard">' +
    '<span class="fgoverlap">' + Math.round(100*m.sim) + '% <span style="font-size:11px;color:var(--muted);font-weight:400">' + esc(t("profile overlap")) + '</span></span>' +
    '<div class="fghead">' + avatarHTML(m) +
      '<div><div class="fgname">' + nameHTML + '</div>' +
      '<div class="fgsector">' + esc(sectorName(m.sector)) + '</div></div></div>' +
    '<div class="shareLead">' + esc(t("You both:")) + '</div>' +
    m.shared.map(c => {
      const ln = EV && EV[m.id] && EV[m.id][c] ? (EV[m.id][c][LANG === "zh" ? "zh" : "en"] || "") : "";
      return '<div class="evrow"><span class="chip">' + esc(traitPhrase(c)) + '</span>' +
             (ln ? '<span class="evtext">' + esc(ln) + '</span>' : '') + '</div>';
    }).join("") +
    '</div>';
}

function renderResults(){
  screen = "results";
  advancing = false;
  pwrap.classList.remove("on");

  // compute + persist exactly once per completion; lang toggle reuses the cache
  if (!resultCtx || resultCtx.answersRef !== answers){
    const r = computeR(answers);
    const A = CODES.filter(c => r[c] !== null);
    const unlocked = A.length >= MIN_ANSWERED;
    const arch = archetype(r);
    const fm = unlocked ? fieldMatch(r) : { flat:false, fields:[] };
    const matches = unlocked ? figureMatch(r) : [];
    const rec = {
      session_id: uuid4(),
      ts: new Date().toISOString(),
      quiz_version: QUIZ_VERSION,
      lang: LANG,
      user_sector: "",
      answers: answers,
      r: r,
      archetype: arch.label,
      fields: fm.fields.map(f => ({ sector: f.sector, fit: +f.fit.toFixed(1) })),
      matches: matches.map(m => ({ id: m.id, name: m.name, sim: +m.sim.toFixed(3), shared: m.shared }))
    };
    const saved = saveRecord(rec);
    submitResponse(rec); // no-op until ENDPOINT is set (see BACKEND HOOK above)
    resultCtx = { answersRef: answers, r, A, unlocked, arch, fm, matches, rec, saved };
  }
  const { r, A, unlocked, arch, fm, matches, rec, saved } = resultCtx;
  const ad = archDisplay(arch);

  // ---- hero ----
  const heroLine = LANG === "zh"
    ? '你的童年读起来像一位' + esc(ad.adj) + '的' + esc(ad.noun) + '，让人过目难忘。'
    : 'Your childhood reads like ' + indefArticle(ad.noun) + ' ' + esc(ad.noun) +
      '’s — ' + esc(ad.adj) + ', and hard to ignore.';
  let html =
   '<div class="card heroCard">' +
    '<div class="eyebrow">' + esc(t("Your childhood archetype")) + '</div>' +
    '<h2>' + esc(ad.label) + '</h2>' +
    '<p>' + heroLine + '</p>' +
   '</div>';

  if (!unlocked){
    html += '<div class="banner">' + (LANG === "zh"
      ? '30 个特质里你已经答了 ' + A.length + ' 个，再答几个就能解锁领域和人物匹配。下方特质条只反映你已回答的部分。'
      : 'You answered ' + A.length + ' of 30 traits — answer a few more to unlock field &amp; figure matches. Trait bars below reflect what you did answer.') +
      '</div>';
  }

  // ---- trait bars ----
  html += '<div class="section card"><h3>' + esc(t("Your trait profile")) + '</h3>' +
    '<div class="shint">' + esc(t("0–100 per trait, grouped into 15 childhood domains. Grey = skipped.")) + '</div>';
  DOMAINS.forEach((d, di) => {
    html += '<div class="domain"><div class="dname">' + esc(domainName(di)) + '</div>';
    for (const c of d.codes){
      if (r[c] === null){
        html += '<div class="trow skipped"><div class="tname">' + esc(traitName(c)) + '</div>' +
          '<div class="track"></div><div class="tval">' + esc(t("skipped")) + '</div></div>';
      } else {
        const pct = Math.round(100*r[c]);
        const fillStyle = pct === 0 ? 'width:0;min-width:0' : 'width:' + pct + '%';
        html += '<div class="trow"><div class="tname">' + esc(traitName(c)) + '</div>' +
          '<div class="track"><div class="fill" style="' + fillStyle + '"></div></div>' +
          '<div class="tval">' + pct + '</div></div>';
      }
    }
    html += '</div>';
  });
  html += '</div>';

  // ---- field match ----
  if (unlocked){
    html += '<div class="section card"><h3>' + esc(t("Fields whose eminent figures your childhood most resembles")) + '</h3>' +
      '<div class="shint">' + esc(t("Relative fit among 13 fields (all 13 sum to 100%) — based on which traits are distinctive of each field’s eminent figures.")) + '</div>';
    if (fm.flat){
      html += '<div class="banner">' + esc(t("Your profile is too even to point anywhere — delightfully unclassifiable.")) + '</div>';
    } else {
      html += '<div class="cards">';
      fm.fields.forEach((f, i) => {
        const rank = LANG === "zh" ? '领域匹配 第 ' + (i+1) + ' 名' : '#' + (i+1) + ' field match';
        html += '<div class="fieldCard"><div class="frank">' + rank + '</div>' +
          '<div class="fname">' + esc(sectorName(f.sector)) + '</div>' +
          '<div class="ffit">' + f.fit.toFixed(1) + '% <span class="ffitlabel">' + esc(t("relative fit among 13 fields")) + '</span></div>' +
          (f.drivers.length ? '<div class="chips">' + f.drivers.map(d => '<span class="chip">' + esc(driverLabel(d)) + '</span>').join("") + '</div>' : '') +
          '</div>';
      });
      html += '</div>';
    }
    html += '</div>';

    // ---- figure match ----
    html += '<div class="section card"><h3>' + esc(t("Eminent figures who share your profile")) + '</h3>' +
      '<div class="shint">' + esc(t("Rarity-weighted profile overlap: sharing an uncommon trait counts far more than a common one. 100% means your defining traits match theirs exactly.")) + '</div>';
    if (matches.length){
      html += '<div class="cards">' + matches.map(figCardHTML).join("") + '</div>';
    } else {
      html += '<div class="banner">' + esc(t("No figure cleared the match bar (at least 3 shared present traits) — your combination is genuinely uncommon in this corpus.")) + '</div>';
    }
    html += '</div>';

    // ---- your own field ----
    const selSector = resultCtx.userSector || "";
    html += '<div class="section card"><h3>' + esc(t("Which field do you actually work in?")) + '</h3>' +
      '<div class="shint">' + esc(t("Pick your field to see the eminent figures in it whose childhood profiles are closest to yours.")) + '</div>' +
      '<select id="mySector" class="sectorSel"><option value="">' + esc(t("Choose your field…")) + '</option>' +
      Object.keys(SECTOR_NAMES).map(s => '<option value="' + escAttr(s) + '"' + (s === selSector ? ' selected' : '') + '>' + esc(sectorName(s)) + '</option>').join("") +
      '</select><div id="mySectorCards"></div></div>';
  }

  // ---- disclaimer (always visible) ----
  html += '<div class="section"><div class="disclaimer">' + disclaimerHTML() + '</div></div>';

  // ---- buttons ----
  const nrec = loadRecords().length;
  const savenote = saved
    ? (LANG === "zh"
        ? '结果已保存到此浏览器（已存 ' + nrec + ' 份回答）。'
        : 'Result saved to this browser (' + nrec + ' stored response' + (nrec===1?'':'s') + ').')
    : (LANG === "zh"
        ? '没能保存到本地（浏览器存储被禁用或已满）。结果还在上方，可以用下载按钮保存。'
        : 'Couldn’t save locally (storage blocked or full) — your result is still shown above; use the download buttons.');
  html += '<div class="btnRow">' +
    '<button class="btn primary" id="shareBtn">' + esc(t("Share")) + '</button>' +
    '<button class="btn ghost" id="dlMine">' + esc(t("Download my result (CSV)")) + '</button>' +
    '<button class="btn ghost" id="dlAll">' + esc(t("Download ALL stored responses (CSV)")) + '</button>' +
    '<button class="btn ghost" id="restartBtn">' + esc(t("Restart")) + '</button>' +
   '</div>' +
   '<div class="savenote' + (saved?'':' err') + '">' + savenote + '</div>';

  stage.innerHTML = html;

  // wire own-field dropdown
  const sectorSel = document.getElementById("mySector");
  if (sectorSel){
    const renderSectorCards = () => {
      const box = document.getElementById("mySectorCards");
      const sec = resultCtx.userSector;
      if (!sec){ box.innerHTML = ""; return; }
      const sm = figureMatch(r, sec, 1);
      box.innerHTML = sm.length
        ? '<div class="cards" style="margin-top:14px">' + sm.map(figCardHTML).join("") + '</div>'
        : '<div class="banner" style="margin-top:14px">' + esc(t("No figure in this field shares enough measured traits with you for a comparison.")) + '</div>';
    };
    sectorSel.onchange = () => {
      resultCtx.userSector = sectorSel.value || null;
      rec.user_sector = resultCtx.userSector || "";
      updateSavedRecord(rec);
      renderSectorCards();
    };
    renderSectorCards();
  }

  // wire buttons
  document.getElementById("shareBtn").onclick = () => {
    const names = matches.map(figName).join(LANG === "zh" ? "、" : ", ");
    const url = location.href.startsWith("file:") ? "" : " " + location.href;
    let text;
    if (LANG === "zh"){
      text = "我是「" + ad.label + "」";
      if (fm.fields.length) text += "。最接近的领域：" + sectorName(fm.fields[0].sector);
      if (names) text += "；我的童年画像与" + names + "相似";
      text += "。" + url;
    } else {
      text = "I’m " + arch.label;
      if (fm.fields.length) text += " — closest field: " + (SECTOR_NAMES[fm.fields[0].sector] || fm.fields[0].sector);
      if (names) text += "; I share my childhood profile with " + names;
      text += "." + url;
    }
    if (navigator.share){
      navigator.share({ text }).catch(()=>{});
    } else if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>toast(t("Copied to clipboard"))).catch(()=>toast(text));
    } else { toast(text); }
  };
  document.getElementById("dlMine").onclick = () =>
    downloadCSV([csvHeader(), recordToRow(rec)], "eminence_quiz_result_" + today() + ".csv");
  document.getElementById("dlAll").onclick = () => {
    const recs = loadRecords();
    if (!recs.length && !saved){ downloadCSV([csvHeader(), recordToRow(rec)], "eminence_quiz_responses_" + today() + ".csv"); return; }
    downloadCSV([csvHeader()].concat(recs.map(recordToRow)), "eminence_quiz_responses_" + today() + ".csv");
  };
  document.getElementById("restartBtn").onclick = () => { answers = {}; qIdx = 0; resultCtx = null; swap(renderLanding); };
}

document.getElementById("langBtn").onclick = () => setLang(LANG === "zh" ? "en" : "zh");
applyChrome();
renderLanding();
</script>
</body>
</html>
